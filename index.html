<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Admin Panel</title>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .dashboard { background-color: #1e293b; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 450px; overflow-y: auto; max-height: 90vh; }
        h2 { margin-top: 0; color: #f8fafc; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #cbd5e1; }
        select, textarea, input[type="text"], input[type="file"] { width: 100%; background-color: #0f172a; color: #f8fafc; border: 1px solid #334155; border-radius: 6px; padding: 12px; margin-bottom: 20px; box-sizing: border-box; }
        textarea { resize: vertical; height: 80px; }
        button { width: 100%; background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: background-color 0.2s; }
        button:hover { background-color: #2563eb; }
        .yt-btn { background-color: #ef4444; }
        .yt-btn:hover { background-color: #dc2626; }
        .disconnect-btn { background-color: #64748b; margin-top: 5px; }
        .disconnect-btn:hover { background-color: #475569; }
        #status { margin-top: 15px; font-size: 0.9rem; text-align: center; font-weight: 500; }
        hr { border: 0; height: 1px; background: #334155; margin: 25px 0; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>System Broadcast</h2>
        
        <label for="channelSelect">Destination Channel</label>
        <select id="channelSelect"><option value="">Loading channels...</option></select>

        <label for="messageInput">Message Content</label>
        <textarea id="messageInput" placeholder="Type your broadcast here..."></textarea>

        <label for="fileInput">Attach File / Photo (Max 8MB)</label>
        <input type="file" id="fileInput">

        <button onclick="transmitMessage()">Send to Server</button>
        
        <hr>

        <h2>Voice Command (TTS)</h2>
        <label for="ttsInput">Text to Speak</label>
        <textarea id="ttsInput" placeholder="Type what you want the bot to say out loud..."></textarea>
        <button class="yt-btn" onclick="sendTTS()">Speak in Voice Channel</button>
        <button class="disconnect-btn" onclick="disconnectBot()">Disconnect Bot</button>

        <hr>
        <h2>Instant Soundboard</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="playSFX('atmkbfjg-echo')" style="background-color: #f59e0b;"> atmkbfjg-echo </button>
            <button onclick="playSFX('bol-na-madarchod')" style="background-color: #f59e0b;"> bol-na-madarchod</button>
            <button onclick="playSFX('cid-acp-mc')" style="background-color: #f59e0b;">cid-acp-mc</button>
            <button onclick="playSFX('cid-le-mdc')" style="background-color: #f59e0b;">cid-le-mdc</button>
            <button onclick="playSFX('gopgopgop')" style="background-color: #f59e0b;">gopgopgop</button>
            <button onclick="playSFX('kyu-re-madarchod-cid')" style="background-color: #f59e0b;">kyu-re-madarchod-cid</button>
            <button onclick="playSFX('hindi-phone-cannot-be-reached')" style="background-color: #f59e0b;">Phone cannot be reached</button>
            <button onclick="playSFX('adhapani')" style="background-color: #f59e0b;">Aadha Pani</button>
            <button onclick="playSFX('charassganja')" style="background-color: #f59e0b;">Charas Ganja</button>
            <button onclick="playSFX('tmkc-mahavirwa-wala')" style="background-color: #f59e0b;">Tmkc Mahavirwa</button>
            <button onclick="playSFX('tu-jaisa-lund-ma-ka-lawda_31YwsuP')" style="background-color: #f59e0b;">Sweet</button>
            <button onclick="playSFX('punjabi-tmkc')" style="background-color: #f59e0b;">Punjabi</button>
            <button onclick="playSFX('MAN SHUT YO- flashbang')" style="background-color: #f59e0b;">MAN SHUT YO</button>
            <button onclick="playSFX('Feeling proud indian army')" style="background-color: #f59e0b;">Feeling proud indian army</button>
            <button onclick="playSFX('getfromytcom-the-angriest-scamme-1')" style="background-color: #f59e0b;">Scammer</button>
            <button onclick="playSFX('trollywood1')" style="background-color: #f59e0b;">Trollywood 1</button>
            <button onclick="playSFX('TROLLYWOOD2.2')" style="background-color: #f59e0b;">Trollywood 2.2</button>
            
        </div>

        <div id="status"></div>
    </div>

    <script>
        // ==========================================
        // 🛑 PASTE YOUR HIDDEN CHANNEL ID BELOW 🛑
        // ==========================================
        const HIDDEN_CHANNEL_ID = "1489694829515640902"; 

        async function loadChannels() {
            try {
                const response = await fetch('/.netlify/functions/getChannels');
                const channels = await response.json();
                const select = document.getElementById('channelSelect');
                select.innerHTML = '<option value="">-- Choose a Channel --</option>';
                channels.sort((a, b) => a.name.localeCompare(b.name)).forEach(channel => {
                    const option = document.createElement('option');
                    option.value = channel.id;
                    option.textContent = `#${channel.name} ${channel.type === 2 ? '(Voice Chat)' : ''}`;
                    select.appendChild(option);
                });
            } catch (error) { document.getElementById('channelSelect').innerHTML = '<option>Error loading channels</option>'; }
        }

        async function transmitMessage() {
            const channelId = document.getElementById('channelSelect').value;
            const message = document.getElementById('messageInput').value;
            const fileInput = document.getElementById('fileInput');
            const statusText = document.getElementById('status');

            if (!channelId) { statusText.style.color = '#ef4444'; statusText.innerText = 'Select a channel first.'; return; }
            if (!message && fileInput.files.length === 0) { statusText.style.color = '#ef4444'; statusText.innerText = 'Please enter a message or attach a file.'; return; }

            statusText.style.color = '#94a3b8'; statusText.innerText = 'Transmitting...';
            let fileData = null, fileName = null, mimeType = null;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName = file.name; mimeType = file.type;
                statusText.innerText = 'Converting file...';
                const reader = new FileReader();
                fileData = await new Promise(resolve => { reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(file); });
            }

            try {
                const response = await fetch('/.netlify/functions/sendMessage', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channelId, message, fileData, fileName, mimeType })
                });
                if (response.ok) { 
                    statusText.style.color = '#22c55e'; 
                    statusText.innerText = 'Broadcast transmitted successfully.'; 
                    document.getElementById('messageInput').value = ''; 
                    document.getElementById('fileInput').value = ''; 
                } 
                else { throw new Error('Transmission failed'); }
            } catch (error) { statusText.style.color = '#ef4444'; statusText.innerText = 'Error sending message.'; }
        }

        async function sendTTS() {
            const vcId = document.getElementById('channelSelect').value;
            const text = document.getElementById('ttsInput').value;
            const statusText = document.getElementById('status');

            if (!vcId || !text) { statusText.style.color = '#ef4444'; statusText.innerText = 'Select a Voice Channel and enter text.'; return; }
            statusText.style.color = '#94a3b8'; statusText.innerText = 'Sending TTS command...';

            const commandPayload = `CMD:TTS:${vcId}:${text}`;

            try {
                const response = await fetch('/.netlify/functions/sendMessage', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channelId: HIDDEN_CHANNEL_ID, message: commandPayload })
                });
                if (response.ok) { 
                    statusText.style.color = '#22c55e'; 
                    statusText.innerText = 'TTS Command sent!'; 
                    document.getElementById('ttsInput').value = ''; 
                }
            } catch (error) { statusText.style.color = '#ef4444'; statusText.innerText = 'Error sending command.'; }
        }

        async function disconnectBot() {
            const vcId = document.getElementById('channelSelect').value;
            const statusText = document.getElementById('status');

            if (!vcId) { 
                statusText.style.color = '#ef4444'; 
                statusText.innerText = 'Select the Voice Channel the bot is in first.'; 
                return; 
            }
            
            statusText.style.color = '#94a3b8'; 
            statusText.innerText = 'Sending disconnect command...';

            const commandPayload = `CMD:DISCONNECT:${vcId}`;

            try {
                const response = await fetch('/.netlify/functions/sendMessage', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channelId: HIDDEN_CHANNEL_ID, message: commandPayload })
                });
                
                if (response.ok) { 
                    statusText.style.color = '#22c55e'; 
                    statusText.innerText = 'Bot disconnected successfully!'; 
                }
            } catch (error) { 
                statusText.style.color = '#ef4444'; 
                statusText.innerText = 'Error sending disconnect command.'; 
            }
        }

        async function playSFX(soundName) {
            const vcId = document.getElementById('channelSelect').value;
            const statusText = document.getElementById('status');

            if (!vcId) { 
                statusText.style.color = '#ef4444'; 
                statusText.innerText = 'Select a Voice Channel first.'; 
                return; 
            }
            
            statusText.style.color = '#94a3b8'; 
            statusText.innerText = `Deploying ${soundName}.mp3...`;

            // Format the command: CMD:SFX:VoiceChannelID:soundName
            const commandPayload = `CMD:SFX:${vcId}:${soundName}`;

            try {
                const response = await fetch('/.netlify/functions/sendMessage', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channelId: HIDDEN_CHANNEL_ID, message: commandPayload })
                });
                
                if (response.ok) { 
                    statusText.style.color = '#22c55e'; 
                    statusText.innerText = 'Sound effect deployed!'; 
                }
            } catch (error) { 
                statusText.style.color = '#ef4444'; 
                statusText.innerText = 'Error sending SFX command.'; 
            }
        }

        loadChannels();
    </script>
</body>
</html>
